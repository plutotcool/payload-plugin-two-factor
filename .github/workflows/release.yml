name: Release
on:
  workflow_dispatch:
    inputs:
      release-type:
        description: 'Release type'
        required: false
        default: ''
        type: choice
        options:
          - ''
          - patch
          - minor
          - major
          - prerelease
          - prepatch
          - preminor
          - premajor

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest

    permissions:
      contents: write
      id-token: write
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Setup git identity
        run: |
          git config --local user.email "plutotcool+github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version-file: '.node-version'
      - name: Enable corepack
        run: corepack enable
      - name: Install dependencies
        run: pnpm install
      - name: Build package
        run: pnpm build
      - name: Release package
        run: pnpm release ${{ inputs.release-type && format('--{0}', inputs.release-type) || '' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Resolve npm dist-tag
        id: dist-tag
        run: |
          version="$(npm pkg get version | tr -d '"')"
          if [[ "$version" == *-* ]]; then
            prerelease="${version#*-}"   # 0.1.0-rc.1 -> rc.1 ; 1.0.0-0 -> 0
            tag="${prerelease%%.*}"      # rc.1 -> rc          ; 0 -> 0
            [[ "$tag" =~ ^[0-9]+$ ]] && tag="next"   # changelogen prerelease numérique
          else
            tag="latest"
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "Resolved dist-tag: $tag"
      - name: Setup node for npm
        uses: actions/setup-node@v4
        with:
          node-version-file: '.node-version'
          registry-url: 'https://registry.npmjs.org'
          scope: '@plutotcool'
      - name: Publish to npm
        run: npm publish --access public --tag ${{ steps.dist-tag.outputs.tag }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Setup node for GitHub Packages
        uses: actions/setup-node@v4
        with:
          node-version-file: '.node-version'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@plutotcool'
      - name: Publish to GitHub Packages
        run: npm publish --registry=https://npm.pkg.github.com --tag ${{ steps.dist-tag.outputs.tag }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
